name: Feature request
description: Suggest an idea for this project
title: "[FEAT]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a new feature!
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear and concise description of what you want.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: What problem does this solve?
      description: Explain why this feature is necessary.
  - type: textarea
    id: solutions
    attributes:
      label: Considered Solutions
      description: Describe the solutions or alternatives you have considered.
